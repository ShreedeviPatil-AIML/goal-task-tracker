name: goal_tracker
description: Goal Tracker Mobile App - Track your goals with streaks and XP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  fl_chart: ^0.65.0
  intl: ^0.18.1
  flutter_svg: ^2.0.9
  
  # Animations
  lottie: ^2.7.0
  confetti: ^0.7.0
  
  # Utils
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
